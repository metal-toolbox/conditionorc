log_level: debug
app_kind: server

listen_address: localhost:9001
store_kind: serverservice
condition_definitions:
  - name: inventoryOutofband
    exclusive: false
  - name: firmwareInstall
    exclusive: true
serverservice_options:
  endpoint: http://localhost:8000
  disable_oauth: true
  facility_code: dc13
  #oidc_issuer_endpoint: foo.bar/oidc/issuer
  #oidc_audience_endpoint: foo.bar/oidc/audience
  #oidc_client_id: conditionorc
  #oidc_client_scopes:
  #  - read
  #  - write
events_broker_kind: nats
nats_options:
  app_name: conditionorc
  url: nats://nats:4222
  stream_user: conditionorc
  stream_pass: password
  #creds_file:
  publisher_subject_prefix: com.hollow.sh.controllers.commands
  stream_urn_ns: hollow-controllers
  consumer:
    name: conditionorc
    #queue_group: controllers
    ack_wait: 5m
    max_ack_pending: 10
    # setting a filter subject turns this consumer into push based.
    #filter_subject: com.hollow.sh.controllers.responses.>
    
    subscribe_subjects:
      - com.hollow.sh.controllers.responses.>
  stream:
    name: controllers
    subjects:
      - com.hollow.sh.controllers.commands.>
      - com.hollow.sh.controllers.replies.>
    acknowledgements: true
    duplicate_window: 5m
    retention: workQueue
  subscribe_subjects:
    - com.hollow.sh.serverservice.events.>
  connect_timeout: 100ms
